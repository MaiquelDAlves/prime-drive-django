{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}" />
    <script src="{% static 'js/main.js' %}" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prime-drive</title>
  </head>
  <body>
    <!-- HEADER / CABEÇALHO PRINCIPAL -->
    <header class="h-16 border-b border-white/10">
      <div
        class="container mx-auto h-full flex items-center justify-between px-6"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          fill="currentColor"
          class="size-8 mr-2 transition-colors duration-300 stroke-gold-premium lg:hidden"
        >
          <path
            d="M16.02 3C8.86 3 3.04 8.82 3.04 15.98c0 2.3.6 4.54 1.75 6.51L3 29l6.68-1.75a12.9 12.9 0 0 0 6.34 1.62C23.18 28.87 29 23.05 29 15.89 29 8.74 23.18 3 16.02 3Zm0 23.67c-2.02 0-4-.54-5.73-1.57l-.41-.24-3.96 1.04 1.06-3.86-.27-.43a10.7 10.7 0 0 1-1.63-5.63c0-6.03 4.91-10.94 10.94-10.94 2.92 0 5.67 1.14 7.73 3.2a10.86 10.86 0 0 1 3.21 7.65c0 6.03-4.91 10.78-10.94 10.78Zm6.01-8.19c-.33-.16-1.95-.96-2.25-1.07-.3-.11-.52-.16-.74.16-.22.33-.85 1.07-1.04 1.29-.19.22-.38.25-.71.08-.33-.16-1.39-.51-2.65-1.63-.98-.87-1.64-1.95-1.83-2.28-.19-.33-.02-.51.14-.67.15-.15.33-.38.49-.57.16-.19.22-.33.33-.55.11-.22.05-.41-.03-.57-.08-.16-.74-1.78-1.01-2.44-.27-.64-.54-.55-.74-.56h-.63c-.22 0-.57.08-.87.41-.3.33-1.14 1.11-1.14 2.71s1.17 3.14 1.33 3.36c.16.22 2.3 3.51 5.58 4.92.78.34 1.39.54 1.86.69.78.25 1.49.21 2.05.13.63-.09 1.95-.8 2.23-1.57.27-.77.27-1.43.19-1.57-.08-.14-.3-.22-.63-.38Z"
          />
        </svg>
        <!-- LOGO / IDENTIDADE DA MARCA -->
        <div class="cursor-pointer">
          <img class="w-30" src="{% static 'assets/logo/logo.png' %}" alt="logo" />
        </div>
        <!-- MENU DESKTOP -->
        <nav class="hidden lg:flex text-white text-xs items-center h-full">
          <ul class="flex text-sm xl:text-base gap-10 h-full items-center">
            <li class="h-full flex items-center">
              <a
                class="h-full items-center flex hover:text-gold-premium transition-colors duration-300"
                href="{% url 'inicio' %}"
                >INICIO</a
              >
            </li>
            <li class="h-full flex items-center">
              <a
                class="h-full items-center flex hover:text-gold-premium transition-colors duration-300"
                href="{% url 'servicos' %}"
                >SERVIÇOS</a
              >
            </li>
            <li class="h-full flex items-center">
              <a
                class="h-full items-center flex hover:text-gold-premium transition-colors duration-300"
                href="{% url 'veiculo' %}"
                >VEÍCULO</a
              >
            </li>
            <li class="h-full flex items-center">
              <a
                class="h-full items-center flex hover:text-gold-premium transition-colors duration-300"
                href="{% url 'sobre' %}"
                >SOBRE NÓS</a
              >
            </li>
            <li class="h-full flex items-center">
              <a
                class="h-full items-center flex hover:text-gold-premium transition-colors duration-300"
                href="{% url 'contato' %}"
                >CONTATO</a
              >
            </li>
          </ul>
        </nav>
        <!-- BOTÃO SOLICITAR ORÇAMENTO DO HEADER - DESKTOP -->
        <a
          href="{% url 'orcamento' %}"
          class="hidden bg-gold-premium rounded-md py-2 px-4 text-black font-semibold cursor-pointer md: lg:block transition-all duration-300 hover:brightness-110 hover:scale-105 hover:shadow-xl"
        >
          SOLICITAR ORÇAMENTO
        </a>
        <!-- BOTÃO MENU MOBILE / HAMBÚRGUER -->
        <div id="btn-menu" class="lg:hidden">
          <button
            type="button"
            class="flex items-center justify-center w-11 h-11 rounded-xl border border-white/10 bg-white/5 backdrop-blur-md text-white hover:bg-white/10 transition"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>
    <!-- MENU MOBILE LATERAL -->
    <nav
      id="mobile-menu"
      class="fixed top-0 right-0 w-[280px] h-screen bg-blue-deep/95 backdrop-blur-xl border-l border-white/10 z-50 translate-x-full"
    >
      <!-- BOTAO FECHAR MENU MOBILE -->
      <div id="menu-close" class="flex justify-end p-6 cursor-pointer">
        <button type="button" aria-label="Fechar menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            class="size-8 stroke-gold-premium"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18 18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
      <!-- LINKS DO MENU MOBILE -->
      <ul class="flex flex-col gap-10 pt-20 px-8 text-white text-sm">
        <li class="hover:text-gold-premium transition cursor-pointer">
          <a href="{% url 'inicio' %}">INICIO</a>
        </li>

        <li class="hover:text-gold-premium transition cursor-pointer">
          <a href="{% url 'servicos' %}">SERVICOS</a>
        </li>

        <li class="hover:text-gold-premium transition cursor-pointer">
          <a href="{% url 'veiculo' %}">VEICULO</a>
        </li>

        <li class="hover:text-gold-premium transition cursor-pointer">
          <a href="{% url 'sobre' %}">SOBRE NOS</a>
        </li>

        <li class="hover:text-gold-premium transition cursor-pointer">
          <a href="{% url 'contato' %}">CONTATO</a>
        </li>
      </ul>
    </nav>

    {% block 'conteudo' %} {% endblock 'conteudo' %}
    {% block scripts %}{% endblock scripts %}
  </body>
</html>
